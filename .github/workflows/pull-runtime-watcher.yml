name: pull-runtime-watcher

permissions: {}

on: [pull_request, workflow_dispatch]

jobs:
  lint-build-test-runtime-watcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "runtime-watcher/go.mod"
          cache-dependency-path: "runtime-watcher/go.sum"
      - name: Get configuration
        uses: ./.github/actions/configuration
        id: configuration
      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v${{ steps.configuration.outputs.golangci_lint_version }}
          args: --config=../.golangci.yaml --verbose
          working-directory: ./runtime-watcher
      - name: Build
        run: make build-verbose
        working-directory: ./runtime-watcher
      - name: Test
        run: make test
        working-directory: ./runtime-watcher
