name: pull-listener-pkg

permissions: {}

on: [pull_request, workflow_dispatch]

jobs:
  lint-build-test-listener-pkg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "listener/go.mod"
          cache-dependency-path: "listener/go.sum"
      - name: Get configuration
        uses: ./.github/actions/configuration
        id: configuration
      - name: Lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v${{ steps.configuration.outputs.golangci_lint_version }}
          args: --config=../.golangci.yaml --verbose
          working-directory: ./listener
      - name: Build
        run: make build-verbose
        working-directory: ./listener
      - name: Test
        run: make test
        working-directory: ./listener
